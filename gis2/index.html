<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz GIS — Série 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.1);
      --text: #f0f0f0;
      --muted: #666;
      --wrong: #ff5f5f;
      --wrong-dim: rgba(255, 95, 95, 0.1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 3rem 2rem;
    }

    header {
      max-width: 680px;
      margin: 0 auto 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    .back {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }

    .back:hover {
      color: var(--accent);
    }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
    }

    .progress-wrap {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: right;
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 0.4rem;
      width: 80px;
      margin-left: auto;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    main {
      max-width: 680px;
      margin: 0 auto;
    }

    .question-meta {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .question-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      line-height: 1.5;
      margin-bottom: 2rem;
      color: var(--text);
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .option {
      background: var(--surface);
      padding: 1.1rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: background 0.12s;
      border: none;
      text-align: left;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      width: 100%;
    }

    .option:hover:not(:disabled) {
      background: #1e1e1e;
    }

    .option-letter {
      font-size: 0.65rem;
      color: var(--muted);
      min-width: 1.2rem;
      text-transform: uppercase;
    }

    .option.correct {
      background: var(--accent-dim);
      border-left: 2px solid var(--accent);
    }

    .option.correct .option-letter {
      color: var(--accent);
    }

    .option.wrong {
      background: var(--wrong-dim);
      border-left: 2px solid var(--wrong);
    }

    .option.wrong .option-letter {
      color: var(--wrong);
    }

    .option:disabled {
      cursor: default;
    }

    .explanation {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.6;
      padding: 1rem 1.2rem;
      border-left: 2px solid var(--border);
      margin-bottom: 2rem;
      display: none;
    }

    .explanation.visible {
      display: block;
    }

    .btn-next {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      padding: 0.85rem 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      display: none;
      transition: opacity 0.15s;
    }

    .btn-next:hover {
      opacity: 0.85;
    }

    .btn-next.visible {
      display: inline-block;
    }

    #result-screen {
      display: none;
      text-align: left;
    }

    .result-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .result-score {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 4rem;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .result-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 3rem;
    }

    .result-breakdown {
      background: var(--border);
      height: 1px;
      margin-bottom: 2rem;
    }

    .btn-retry {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.85rem 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.15s;
      margin-right: 1rem;
    }

    .btn-retry:hover {
      background: var(--accent-dim);
    }

    .btn-hub {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }

    .btn-hub:hover {
      color: var(--text);
    }
  </style>
</head>

<body>

  <header>
    <a class="back" href="../">← Hub</a>
    <div class="header-title">GIS Foundation — Série 2</div>
    <div class="progress-wrap">
      <span id="progress-text">1 / 22</span>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:4.5%"></div>
      </div>
    </div>
  </header>

  <main>
    <div id="quiz-screen">
      <div class="question-meta" id="question-domain">Domaine · —</div>
      <div class="question-text" id="question-text"></div>
      <div class="options" id="options-list"></div>
      <div class="explanation" id="explanation"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Question suivante →</button>
    </div>

    <div id="result-screen">
      <div class="result-label">— Résultat final</div>
      <div class="result-score" id="result-score"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="result-breakdown"></div>
      <button class="btn-retry" onclick="restart()">Recommencer</button>
      <a class="btn-hub" href="../">← Retour au hub</a>
    </div>
  </main>

  <script>
    const questions = [
      {
        domain: "Data Discovery",
        question: "What does DMS stand for when describing coordinate units in GIS?",
        options: [
          "Digital Map System",
          "Data Mapping Standard",
          "Dynamic Measure Scale",
          "Degrees Minutes Seconds"
        ],
        answer: 3,
        explanation: "DMS stands for Degrees Minutes Seconds — a traditional way to express geographic coordinates. For example, Toulouse is 43°36'17\" N, 1°26'39\" E in DMS, versus 43.6047°N, 1.4442°E in Decimal Degrees (DD)."
      },
      {
        domain: "Data Discovery",
        question: "What is the difference between DD and DMS coordinate formats?",
        options: [
          "DD uses Degrees Minutes Seconds, DMS uses decimal numbers",
          "They represent different coordinate systems — DD is global, DMS is local",
          "DD expresses coordinates as decimal numbers, DMS splits them into degrees, minutes and seconds",
          "DD is for raster data, DMS is for vector data"
        ],
        answer: 2,
        explanation: "DD (Decimal Degrees) expresses coordinates as a single decimal number like 43.6047°. DMS splits the same coordinate into degrees, minutes and seconds like 43°36'17\". Both describe the same location — just different formats."
      },
      {
        domain: "Data Discovery",
        question: "A raster dataset stores geographic information as:",
        options: [
          "A grid of cells each holding a single value",
          "Points, lines and polygons with attribute tables",
          "A collection of feature classes in a geodatabase",
          "A set of coordinates linked to a metadata file"
        ],
        answer: 0,
        explanation: "Raster data is a grid (like a spreadsheet or image) where each cell holds one value — an elevation, temperature, color, etc. Vector data uses points, lines and polygons. Do not confuse the two."
      },
      {
        domain: "Data Discovery",
        question: "Which of the following best describes metadata in GIS?",
        options: [
          "The color scheme applied to a layer",
          "The coordinate system used to display a map on screen",
          "Data that describes other data — such as source, date, author and coordinate system",
          "The visual symbology rules for rendering a layer"
        ],
        answer: 2,
        explanation: "Metadata describes the data itself: who created it, when, what coordinate system it uses, its accuracy, etc. Symbology (colors, styles) is NOT metadata — it describes how data is displayed, not what the data is."
      },
      {
        domain: "Data Discovery",
        question: "Which coordinate system is the global standard used by GPS and as the basis for Web Mercator?",
        options: [
          "Lambert 93",
          "RGF93",
          "WGS84",
          "Web Mercator"
        ],
        answer: 2,
        explanation: "WGS84 is the global datum used by GPS devices worldwide. Web Mercator uses WGS84 as its datum but is a projected coordinate system — they are different. Lambert 93 and RGF93 are specific to France."
      },
      {
        domain: "Data Discovery",
        question: "What is the correct way to add data to a map from ArcGIS Online?",
        options: [
          "Searching the Living Atlas or ArcGIS Online portal and adding the layer directly to the map",
          "Exporting it to a shapefile first then importing it",
          "Converting it to a File Geodatabase before adding it",
          "Running a geoprocessing tool to import online content"
        ],
        answer: 0,
        explanation: "In ArcGIS Online and ArcGIS Pro, you can search the Living Atlas or the portal directly and add layers to your map without any conversion. This is one of the key workflows tested in the exam."
      },
      {
        domain: "Mapping & Visualization",
        question: "What is a basemap in ArcGIS?",
        options: [
          "A background reference map providing geographic context beneath operational data layers",
          "The first operational layer added to a project",
          "A map that has been validated and exported to PDF",
          "A raster layer containing elevation data"
        ],
        answer: 0,
        explanation: "A basemap is a background reference (streets, satellite imagery, topography) that gives geographic context. It is NOT the first layer you add — it is a specific background type. Your data layers sit on top of it."
      },
      {
        domain: "Mapping & Visualization",
        question: "A map at scale 1:5 000 compared to a map at 1:500 000 is:",
        options: [
          "A smaller scale map showing more territory with less detail",
          "An identical scale expressed with different units",
          "A larger scale map showing less territory but more detail",
          "A smaller scale map because the number 5 000 is smaller"
        ],
        answer: 2,
        explanation: "1:5,000 is a LARGER scale than 1:500,000 because as a fraction, 1/5,000 is mathematically bigger than 1/500,000. Large scale = small area in high detail (like a neighbourhood). Small scale = large area, less detail (like a country)."
      },
      {
        domain: "Mapping & Visualization",
        question: "In ArcGIS Pro, what is the Layout view used for?",
        options: [
          "Running geoprocessing tools on multiple layers",
          "Editing the geometry of individual features",
          "Designing the full page composition for printing — title, legend, scale bar, north arrow",
          "Browsing and connecting to data sources"
        ],
        answer: 2,
        explanation: "The Layout view is where you assemble the final map for printing or export. It contains a map frame (the geographic view) plus other elements like title, legend, north arrow and scale bar."
      },
      {
        domain: "Mapping & Visualization",
        question: "What is the difference between a Layout and a Map Frame in ArcGIS Pro?",
        options: [
          "A map frame is the full printed page, a layout is the raw geographic view",
          "They are two names for the same thing",
          "A layout is the full page design, a map frame is the geographic window inside it",
          "A layout only works with raster layers"
        ],
        answer: 2,
        explanation: "The Layout is the full page — like a poster. The Map Frame is the geographic window embedded inside that layout. Think of a poster (layout) with a map photo inside it (map frame)."
      },
      {
        domain: "Mapping & Visualization",
        question: "Which element must always appear on a printed or published map?",
        options: [
          "The file path to the source data",
          "The attribute table of each layer",
          "Title, legend, scale bar, north arrow and data source",
          "The coordinate table of each feature"
        ],
        answer: 2,
        explanation: "The standard required elements for a published map are: title, legend, scale bar, north arrow and data source/credits. The attribute table and file paths are software elements — they never appear on a printed map."
      },
      {
        domain: "Mapping & Visualization",
        question: "You are mapping road types: highway, local road, bike path. Which symbology type is correct?",
        options: [
          "Graduated colors",
          "Proportional symbols",
          "Unique values",
          "Heat map"
        ],
        answer: 2,
        explanation: "Unique values assigns a distinct color or symbol per category. Road types are qualitative categories with no numeric order — one type is not 'more' than another. Graduated colors would imply a numeric ranking."
      },
      {
        domain: "Mapping & Visualization",
        question: "Which color scheme is best for mapping temperature anomalies above and below the annual average?",
        options: [
          "Diverging — two opposite colors from a neutral center",
          "Sequential — one color that gets progressively darker",
          "Qualitative — distinct colors per category",
          "Classified — fixed color bands with equal intervals"
        ],
        answer: 0,
        explanation: "Diverging color schemes have a neutral midpoint (white or light gray) with contrasting colors in both directions — perfect for data that goes above AND below a reference value like an average or zero."
      },
      {
        domain: "Mapping & Visualization",
        question: "For showing population density from low to high across regions, which color scheme is most appropriate?",
        options: [
          "Diverging — two colors from a center point",
          "Qualitative — distinct unordered colors",
          "Sequential — one color progressing from light to dark",
          "Classified with standard deviation breaks"
        ],
        answer: 2,
        explanation: "Sequential color schemes go in one direction from low to high — ideal for data without a meaningful midpoint. Population density only goes one way (more or less dense), so sequential is correct. Diverging implies above/below a reference value."
      },
      {
        domain: "Mapping & Visualization",
        question: "Which classification method puts the same number of features in each class regardless of value ranges?",
        options: [
          "Natural breaks",
          "Standard deviation",
          "Quantile",
          "Equal interval"
        ],
        answer: 2,
        explanation: "Quantile guarantees an equal count of features per class. Equal interval creates classes of equal value range — which can result in empty classes if data is skewed. Natural breaks finds natural groupings in the data."
      },
      {
        domain: "Mapping & Visualization",
        question: "Which projection is used by Google Maps and ArcGIS Online for web map display?",
        options: [
          "WGS84",
          "Lambert Conformal Conic",
          "Albers Equal Area",
          "Web Mercator"
        ],
        answer: 3,
        explanation: "Web Mercator (EPSG:3857) is the standard projection for web mapping. WGS84 is the datum Web Mercator is based on — they are not the same. Web Mercator preserves local shapes but significantly distorts area near the poles."
      },
      {
        domain: "Processing & Analysis",
        question: "Which tool selects features based on their geographic position relative to another layer?",
        options: [
          "Select by Attribute",
          "Select by Location",
          "Dissolve",
          "Spatial Join"
        ],
        answer: 1,
        explanation: "Select by Location finds features based on spatial relationships — within, intersects, contains, etc. Select by Attribute filters using field values in the attribute table. They are complementary tools."
      },
      {
        domain: "Processing & Analysis",
        question: "You clip a roads layer using a city boundary polygon. Which attributes does the result contain?",
        options: [
          "Attributes from the city boundary polygon only",
          "Attributes from both the roads and the city boundary",
          "No attributes — Clip removes all attribute data",
          "Attributes from the roads layer only"
        ],
        answer: 3,
        explanation: "Clip uses the boundary layer as a 'cookie cutter' — it only cuts the shape. The cutting layer disappears from the result. Only the input layer (roads) keeps its attributes. This is the key difference from Intersect, which keeps attributes from both layers."
      },
      {
        domain: "Processing & Analysis",
        question: "What is a Spatial Join used for?",
        options: [
          "Merging two tables based on a shared field value",
          "Transferring attributes from one layer to another based on geographic position",
          "Dissolving features that share the same attribute value",
          "Clipping a layer to the boundary of another"
        ],
        answer: 1,
        explanation: "Spatial Join transfers attribute data from one layer to another based on spatial relationships — not shared field values (that is a regular attribute join). Example: transferring region names to communes based on which region each commune falls inside."
      },
      {
        domain: "Processing & Analysis",
        question: "You want to find all hospitals within 1km of a flood zone. What is the correct workflow?",
        options: [
          "Dissolve flood zones → Merge with hospitals",
          "Clip hospitals with flood zones directly",
          "Buffer flood zones by 1km → Intersect result with hospitals layer",
          "Select by Attribute on hospitals → Union with flood zones"
        ],
        answer: 2,
        explanation: "Step 1: Buffer the flood zones by 1km to create a proximity zone. Step 2: Intersect that zone with the hospitals layer to keep only hospitals that fall within the buffer. This Buffer → Intersect pattern is the standard proximity workflow."
      },
      {
        domain: "Content Management & Sharing",
        question: "In ArcGIS Online, how can you organize and share content with a specific team?",
        options: [
          "By converting all layers to shapefile and emailing them",
          "By creating a Group and sharing items to that group",
          "By compressing all content into a single geodatabase",
          "By running topology validation before sharing"
        ],
        answer: 1,
        explanation: "Groups in ArcGIS Online let you share and organize content with specific users — inside or outside your organization. Members of the group can access all content shared to it. It is the standard collaboration mechanism."
      },
      {
        domain: "Content Management & Sharing",
        question: "Before sharing a map from ArcGIS Pro to ArcGIS Online, what is the essential step?",
        options: [
          "Convert all layers to raster format",
          "Reproject all layers to WGS84",
          "Validate the map to confirm all layers are accessible and the map is ready to share",
          "Install Python and run a sharing script"
        ],
        answer: 2,
        explanation: "Before sharing from ArcGIS Pro to ArcGIS Online, you must validate the map. This checks that all data sources are accessible, layer names are correct and the map will display properly once published."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;
    let shuffledAnswer = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function loadQuestion() {
      const q = questions[current];
      answered = false;

      document.getElementById('question-domain').textContent = `Domaine · ${q.domain}`;
      document.getElementById('question-text').textContent = q.question;

      const indices = shuffle([0, 1, 2, 3]);
      shuffledAnswer = indices.indexOf(q.answer);
      const letters = ['A', 'B', 'C', 'D'];
      const list = document.getElementById('options-list');
      list.innerHTML = '';

      indices.forEach((origIdx, displayIdx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.innerHTML = `<span class="option-letter">${letters[displayIdx]}</span><span>${q.options[origIdx]}</span>`;
        btn.onclick = () => selectAnswer(displayIdx);
        list.appendChild(btn);
      });

      const expl = document.getElementById('explanation');
      expl.textContent = '';
      expl.classList.remove('visible');

      const next = document.getElementById('btn-next');
      next.classList.remove('visible');
      next.textContent = current === questions.length - 1 ? 'Voir les résultats →' : 'Question suivante →';

      const pct = ((current + 1) / questions.length) * 100;
      document.getElementById('progress-text').textContent = `${current + 1} / ${questions.length}`;
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    function selectAnswer(index) {
      if (answered) return;
      answered = true;

      const q = questions[current];
      const options = document.querySelectorAll('.option');

      options.forEach(btn => btn.disabled = true);
      options[shuffledAnswer].classList.add('correct');

      if (index === shuffledAnswer) {
        score++;
      } else {
        options[index].classList.add('wrong');
      }

      const expl = document.getElementById('explanation');
      expl.textContent = q.explanation;
      expl.classList.add('visible');

      document.getElementById('btn-next').classList.add('visible');
    }

    function nextQuestion() {
      current++;
      if (current < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quiz-screen').style.display = 'none';
      const rs = document.getElementById('result-screen');
      rs.style.display = 'block';

      const pct = Math.round((score / questions.length) * 100);
      document.getElementById('result-score').textContent = `${score}/${questions.length}`;
      document.getElementById('result-sub').textContent =
        pct >= 80 ? `${pct}% — Excellent, tu maîtrises le sujet.` :
          pct >= 60 ? `${pct}% — Bien, encore quelques lacunes.` :
            `${pct}% — À retravailler avant l'exam.`;
    }

    function restart() {
      current = 0;
      score = 0;
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>

</html>
